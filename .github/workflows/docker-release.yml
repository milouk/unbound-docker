name: Build and Push Docker Image

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync README to Docker Hub
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: milouk/unbound

  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get latest upstream unbound release
        id: upstream
        run: |
          LATEST=$(curl -s https://api.github.com/repos/NLnetLabs/unbound/tags?per_page=100 \
            | jq -r '.[].name | select(test("^release-[0-9]+\\.[0-9]+\\.[0-9]+$")) | sub("^release-"; "")' \
            | sort -t. -k1,1n -k2,2n -k3,3n \
            | tail -n1)
          if [ -z "$LATEST" ]; then
            echo "Failed to determine latest upstream version (empty result)." >&2
            exit 1
          fi
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest unbound version: $LATEST"

      - name: Check if image already exists on Docker Hub
        id: check
        run: |
          VERSION=${{ steps.upstream.outputs.version }}
          if docker manifest inspect milouk/unbound:$VERSION > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image milouk/unbound:$VERSION already exists, skipping build."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "New version $VERSION detected, building image."
          fi

      - name: Get SHA256 of unbound tarball
        if: steps.check.outputs.exists == 'false'
        id: sha256
        run: |
          VERSION=${{ steps.upstream.outputs.version }}
          SHA256=$(curl -sL https://nlnetlabs.nl/downloads/unbound/unbound-${VERSION}.tar.gz | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Checkout repo
        if: steps.check.outputs.exists == 'false'
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            UNBOUND_VERSION=${{ steps.upstream.outputs.version }}
            UNBOUND_SHA256=${{ steps.sha256.outputs.sha256 }}
          tags: |
            milouk/unbound:${{ steps.upstream.outputs.version }}
            milouk/unbound:latest

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.upstream.outputs.version }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists, skipping."
            exit 0
          fi
          gh release create "$VERSION" \
            --title "Unbound $VERSION" \
            --target "${{ github.sha }}" \
            --notes "Automated release of \`milouk/unbound:$VERSION\` (unbound $VERSION).

          Docker image: \`docker pull milouk/unbound:$VERSION\`

          Upstream changelog: https://github.com/NLnetLabs/unbound/releases/tag/release-$VERSION"
